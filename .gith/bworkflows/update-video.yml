name: Update Videos JSON

on:
  repository_dispatch:
    types: [update-videos]
  workflow_dispatch:

jobs:
  update-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PUSH_TOKEN }}
          
      - name: Update videos.json
        run: |
          echo '${{ github.event.client_payload.videos }}' > videos.json
          
      - name: Commit and push changes
        run: |
          git config user.name "yaya-bot"
          git config user.email "bot@yaya.space"
          git add videos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🎬 video update from admin panel [skip ci]"
          git push
          
      - name: Trigger site rebuild
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PUSH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
